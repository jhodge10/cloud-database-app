<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Edit Tasks</title>

<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Edit Task</h1>

<form method="POST">

<input
type="text"
name="title"
value="{{ task.title }}"
required>

<label>

<input
type="checkbox"
name="completed"

{% if task.completed %}
checked
{% endif %}

>

Completed!

</label>

<button type="submit">

Save Changes

</button>

</form>

<p>

<a href="/">← Back to Home</a>

</p>

</div>

</body>

</html>
