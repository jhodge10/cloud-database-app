<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud To-Do List</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>To-Do List</h1>

    <form action="/add" method="POST">

    <input
        type="text"
        name="title"
        placeholder="Enter a new task"
        required>

    <button type="submit">
        Add Task
    </button>

</form>

<hr>

    {% if tasks %}

        <ul>

        {% for task in tasks %}

            <li>

                {{ task.title }}

            </li>

        {% endfor %}

        </ul>

    {% else %}

        <p>No tasks yet!</p>

    {% endif %}

</div>

</body>
</html>
